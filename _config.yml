# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Zitao' Thought Notes
subtitle: ''
description: 'As an iOS developer with nearly 10 years of experience, I worked for several major Chinese internet companies and participated in multiple core projects. I used to be a frontline technical practitioner.<br><br>Now I no longer confine myself to iOS development. I jot down summaries and reflections on programming, algorithms, AI and other fields that spark my interest here. <br><br>Feel free to reach out if you wish to exchange ideas.'

keywords:
author: Zitao
language: en
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://zitao0206.github.io
root: /  
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

projects_url: https://github.com/zitao0206
direction: ltr



nav:
  home: /
  search: /search/
  archives: /archives/
  categories: /categories/
  about: /about/

# Search
search:
  path: search.xml   # 生成的文件名，建议用 .json 格式，体积更小
  field: post         # 搜索范围：post（文章）、page（页面）、all（所有）
  content: true       # 是否包含文章全文，设为 false 则只搜索标题
  format: striptags   # 从 HTML 中提取纯文本内容
  limit: 100       # 搜索结果最大数量

local_search:
  enable: true

tags_overview: false

posts_overview:
show_all_posts: false
post_count: 5
sort_updated: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:


# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)


index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
category_generator:
  per_page: 10
  order_by: -date

plugins:
  - hexo-auto-category

# 配置 auto_category（注意是 auto_category，不是 directory_category）
auto_category:
  enable: true               # 启用
  depth: 3                   # 最大分类层级，3表示最多3级

# 插件配置项
directory_category: true          # 启用自动分类
category_prefix: ""               # 分类前缀

default_category: Others
category_map:

tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# utterances:
#   enabled: true
#   repo: owner/githubrepo
#   issue_term: pathname
#   label: utteranc
#   theme: themename

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: Cactus_2.0
# themes/cactus/_config.yml
colorscheme: dark
page_width: 48
gravatar: false
grayout: true

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: git@github.com:zitao0206/zitao0206.github.io.git
  branch: site # 注意：site分支是用来发布用，主代码在main分支。他们代码不相关。
